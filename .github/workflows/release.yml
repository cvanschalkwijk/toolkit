name: Release

# Build + push the api and py images to GHCR on every push to main.
# Operators pull the images from GHCR and deploy them wherever — this
# workflow intentionally stays out of the deploy step so the public
# repo doesn't carry infra-specific assumptions.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Additional image tag (in addition to the commit SHA)'
        required: false
        default: ''

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write

jobs:
  # --- Quick smoke gate before publishing images. ---
  validate:
    name: Validate (bun smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - run: bun run validate

  build-api:
    name: Build & push api image
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/${IMAGE_OWNER,,}/toolkit/api"
          TAGS="${IMAGE}:${{ github.sha }},${IMAGE}:latest"
          if [ -n "${{ inputs.tag }}" ]; then
            TAGS="${TAGS},${IMAGE}:${{ inputs.tag }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          provenance: false

  build-py:
    name: Build & push py image
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/${IMAGE_OWNER,,}/toolkit/py"
          TAGS="${IMAGE}:${{ github.sha }},${IMAGE}:latest"
          if [ -n "${{ inputs.tag }}" ]; then
            TAGS="${TAGS},${IMAGE}:${{ inputs.tag }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: .
          file: apps/py/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BUILD_EXTRAS=all
            SPACY_MODEL=en_core_web_lg
          cache-from: type=gha,scope=py
          cache-to: type=gha,scope=py,mode=max
          provenance: false

# Deployment is left to the operator. Pull the images from GHCR in your
# own compose / k8s manifest, or fork this repo and add a deploy job
# that suits your infrastructure. The repo intentionally ships no
# SSH-based deploy step so nothing deploy-target-specific lives in the
# public template.
