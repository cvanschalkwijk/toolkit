name: Release

# Build + push the api and py images to GHCR on every push to main.
# Optionally SSH to a deploy host to pull + restart if the operator has
# the DEPLOY_* secrets set; the deploy job is otherwise skipped so forks
# without that infra don't see a red X.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Additional image tag (in addition to the commit SHA)'
        required: false
        default: ''

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write

jobs:
  # --- Quick smoke gate before publishing images. ---
  validate:
    name: Validate (bun smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - run: bun run validate

  build-api:
    name: Build & push api image
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/${IMAGE_OWNER,,}/toolkit/api"
          TAGS="${IMAGE}:${{ github.sha }},${IMAGE}:latest"
          if [ -n "${{ inputs.tag }}" ]; then
            TAGS="${TAGS},${IMAGE}:${{ inputs.tag }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          provenance: false

  build-py:
    name: Build & push py image
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/${IMAGE_OWNER,,}/toolkit/py"
          TAGS="${IMAGE}:${{ github.sha }},${IMAGE}:latest"
          if [ -n "${{ inputs.tag }}" ]; then
            TAGS="${TAGS},${IMAGE}:${{ inputs.tag }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: .
          file: apps/py/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BUILD_EXTRAS=all
            SPACY_MODEL=en_core_web_lg
          cache-from: type=gha,scope=py
          cache-to: type=gha,scope=py,mode=max
          provenance: false

  deploy:
    name: Deploy (optional, gated on DEPLOY_* secrets)
    runs-on: ubuntu-latest
    needs: [build-api, build-py]
    # Skip on forks or operators without a deploy target configured.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Abort early if any deploy secret is missing
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_SSH_USER" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::warning::DEPLOY_ENABLED is true but one of DEPLOY_HOST/DEPLOY_SSH_USER/DEPLOY_SSH_KEY is not set. Skipping."
            exit 0
          fi
          echo "all required secrets present" >&2

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync compose + pull + up
        # Assumes /opt/toolkit/repo is a clone of this repo on the target host
        # and /opt/toolkit/.env holds any runtime secrets (LLM_* in particular).
        # Inode-preserving `cat src > dest` keeps Docker bind mounts live-updating.
        run: |
          ssh -i ~/.ssh/id_deploy "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'set -e; cd /opt/toolkit; \
             if [ ! -d repo ]; then git clone https://github.com/${{ github.repository }}.git repo; fi; \
             cd repo && git fetch origin && git reset --hard ${{ github.sha }} && cd ..; \
             cat repo/docker-compose.yml > docker-compose.yml; \
             sed -i "/^IMAGE_TAG=/d" .env && echo "IMAGE_TAG=${{ github.sha }}" >> .env; \
             docker compose pull; \
             docker compose up -d --remove-orphans; \
             sleep 15; \
             docker exec toolkit-api wget -qO- http://localhost:3000/health > /dev/null && echo "healthy"'
