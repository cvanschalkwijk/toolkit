name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-bun:
    name: Bun (typecheck + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun --cwd apps/api run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test apps/api

  validate-py:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps (framework only for now)
        # Later phases add the full engine stack; gate them behind the
        # category they ship with.
        working-directory: apps/py
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv 'fastapi>=0.115' 'uvicorn[standard]>=0.32' pytest pytest-asyncio httpx

      - name: Pytest
        working-directory: apps/py
        run: |
          source .venv/bin/activate
          pytest -q || [ $? -eq 5 ]  # exit 5 = no tests collected, OK for Phase 1
